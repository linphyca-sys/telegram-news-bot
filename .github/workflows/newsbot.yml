name: 뉴스봇

on:
  schedule:
    # 비상용 백업 (주력은 cron-job.org의 10분 트리거) — cron-job이 죽어도 시간당 1회는 돌게 함
    # 10분 주기 트리거(:00,:10,...)와 겹치지 않도록 매시 5분
    - cron: "5 * * * *"
  workflow_dispatch:          # Actions 탭에서 수동 실행 버튼

concurrency:
  group: newsbot
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  check-news:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 의존성 설치
        run: pip install -q -r requirements.txt

      - name: 뉴스 확인 및 전송
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          MAX_PER_KEYWORD: "0"   # 무제한 (건수 제한 없이 전량 전송)
        run: python news_bot.py --once

      - name: 전송 기록 저장
        run: |
          git config user.name "news-bot"
          git config user.email "actions@users.noreply.github.com"
          git add seen_links.json
          if [ -f articles.csv ]; then git add articles.csv; fi
          git diff --cached --quiet && exit 0
          git commit -m "기사 전송 기록 갱신"
          # 실행 중 저장소가 앞서갔을 수 있으므로 최신 상태를 반영한 뒤 푸시 (3회 재시도)
          for i in 1 2 3; do
            git pull --rebase origin master && git push && exit 0
            sleep 5
          done
          exit 1
