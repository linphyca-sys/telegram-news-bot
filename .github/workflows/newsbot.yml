name: 뉴스봇

on:
  workflow_dispatch:          # cron-job.org 트리거 + Actions 탭 수동 실행 버튼
  # schedule은 의도적으로 넣지 않음 — GitHub 스케줄은 지연/이중실행 충돌을 일으킴
  # (2026-07-08, 07-09 실패·중복전송 사고의 원인). 트리거는 cron-job.org 하나만 사용.

concurrency:
  group: newsbot
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  check-news:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 의존성 설치
        run: pip install -q -r requirements.txt

      - name: 뉴스 확인 및 전송
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          MAX_PER_KEYWORD: "0"   # 무제한 (건수 제한 없이 전량 전송)
        run: python news_bot.py --once

      - name: 전송 기록 저장
        run: |
          git config user.name "news-bot"
          git config user.email "actions@users.noreply.github.com"
          git add seen_links.json
          if [ -f articles.csv ]; then git add articles.csv; fi
          git diff --cached --quiet && exit 0
          git commit -m "기사 전송 기록 갱신"
          # 실행 중 저장소가 앞서갔을 수 있으므로 rebase 후 push (실패 시 rebase 정리 후 재시도)
          for i in 1 2 3 4 5; do
            if git pull --rebase origin master && git push; then exit 0; fi
            git rebase --abort 2>/dev/null || true
            sleep 5
          done
          echo "기록 저장 실패 — 다음 실행에서 자동 반영됨"
          exit 0
