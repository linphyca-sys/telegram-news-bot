name: 뉴스봇

on:
  schedule:
    # 10분마다 — 정각(*/10)은 요청이 몰려 지연이 심해서 7분 오프셋 사용
    - cron: "7,17,27,37,47,57 * * * *"
  workflow_dispatch:          # Actions 탭에서 수동 실행 버튼

concurrency:
  group: newsbot
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  check-news:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 의존성 설치
        run: pip install -q -r requirements.txt

      - name: 뉴스 확인 및 전송
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
        run: python news_bot.py --once

      - name: 전송 기록 저장
        run: |
          git config user.name "news-bot"
          git config user.email "actions@users.noreply.github.com"
          git add seen_links.json
          if [ -f articles.csv ]; then git add articles.csv; fi
          git diff --cached --quiet || (git commit -m "기사 전송 기록 갱신" && git push)
